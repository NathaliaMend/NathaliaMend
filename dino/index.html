<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>🦕 Dino Game – NathaliaMend</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    header h1 {
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: #a855f7;
      letter-spacing: 2px;
    }

    header a {
      font-size: clamp(0.45rem, 1.3vw, 0.6rem);
      color: #a855f766;
      text-decoration: none;
      border: 1px solid #a855f733;
      padding: 4px 10px;
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s;
    }
    header a:hover { color: #a855f7; border-color: #a855f7; }

    #canvas {
      border: 2px solid #a855f740;
      border-radius: 10px;
      box-shadow: 0 0 40px #a855f730, 0 0 80px #7c3aed18;
      cursor: pointer;
      touch-action: none;
      display: block;
    }

    footer {
      margin-top: 14px;
      font-size: clamp(0.35rem, 1vw, 0.5rem);
      color: #ffffff33;
      letter-spacing: 1px;
      text-align: center;
      line-height: 2;
    }
  </style>
</head>
<body>

<header>
  <h1>🦕 NathaliaMend</h1>
  <a href="https://github.com/NathaliaMend" target="_blank">← GitHub</a>
</header>

<canvas id="canvas"></canvas>

<footer>
  ESPAÇO / ↑ / TAP para pular &nbsp;·&nbsp; DUPLO PULO ativado<br/>
  Evite os obstáculos e bata seu recorde!
</footer>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const W = 800, H = 300;
canvas.width  = W;
canvas.height = H;

function resize() {
  const maxW = Math.min(window.innerWidth - 24, 800);
  canvas.style.width  = maxW + 'px';
  canvas.style.height = (maxW * H / W) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ─── Constants ────────────────────────────────────────────────────────────────
const GROUND   = H - 58;
const DINO_X   = 88;
const GRAVITY  = 0.72;
const JUMP_V   = -15.5;

// ─── Stars ────────────────────────────────────────────────────────────────────
const STARS = Array.from({length: 90}, () => ({
  x: Math.random() * W,
  y: Math.random() * (GROUND - 10),
  r: Math.random() * 1.4 + 0.2,
  phase: Math.random() * Math.PI * 2
}));

// ─── Clouds ───────────────────────────────────────────────────────────────────
const CLOUDS = Array.from({length: 5}, (_, i) => ({
  x: 120 + i * 170,
  y: 28 + Math.random() * 38,
  w: 55 + Math.random() * 55,
  spd: 0.4 + Math.random() * 0.5
}));

// ─── State ────────────────────────────────────────────────────────────────────
let state     = 'intro';   // 'intro' | 'playing' | 'dead'
let score     = 0;
let highScore = parseInt(localStorage.getItem('nm_hs') || '0');
let speed     = 6;
let tick      = 0;

// ─── Dino ─────────────────────────────────────────────────────────────────────
const dino = {
  y: GROUND, vy: 0,
  jumps: 0,
  leg: 0, legTick: 0,

  reset() {
    this.y = GROUND; this.vy = 0;
    this.jumps = 0; this.leg = 0; this.legTick = 0;
  },

  jump() {
    if (this.jumps < 2) { this.vy = JUMP_V; this.jumps++; }
  },

  update() {
    this.vy += GRAVITY;
    this.y  += this.vy;
    if (this.y >= GROUND) { this.y = GROUND; this.vy = 0; this.jumps = 0; }
    if (this.y === GROUND) {
      if (++this.legTick > 7) { this.leg ^= 1; this.legTick = 0; }
    }
  },

  box() { return { x: DINO_X + 10, y: this.y - 58, w: 35, h: 58 }; },

  draw(dead) {
    const x = DINO_X, y = this.y;
    const col = dead ? '#ff6b6b' : '#a855f7';

    // shadow
    ctx.fillStyle = dead ? '#ff6b6b22' : '#a855f722';
    ctx.beginPath();
    ctx.ellipse(x + 22, GROUND + 5, 24, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = col;

    // tail
    ctx.fillRect(x - 18, y - 32, 20, 11);
    ctx.fillRect(x - 24, y - 23, 10, 9);

    // body
    ctx.fillRect(x, y - 42, 42, 34);

    // neck
    ctx.fillRect(x + 26, y - 52, 14, 14);

    // head
    ctx.fillRect(x + 18, y - 66, 34, 28);

    // jaw / snout
    ctx.fillRect(x + 42, y - 42, 12, 10);

    // eye white
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 36, y - 60, 9, 9);
    // pupil
    ctx.fillStyle = '#1a0030';
    ctx.fillRect(x + 39, y - 58, 5, 5);

    // nostril
    ctx.fillStyle = col;
    ctx.fillRect(x + 48, y - 44, 4, 4);

    // arm
    ctx.fillRect(x + 20, y - 18, 15, 8);

    if (!dead) {
      // legs running
      if (this.leg === 0) {
        ctx.fillRect(x + 7,  y - 8, 12, 24);
        ctx.fillRect(x + 24, y - 8, 12, 14);
        ctx.fillRect(x + 4,  y + 14, 17, 6);
      } else {
        ctx.fillRect(x + 7,  y - 8, 12, 14);
        ctx.fillRect(x + 24, y - 8, 12, 24);
        ctx.fillRect(x + 22, y + 14, 17, 6);
      }
    } else {
      // dead pose
      ctx.fillRect(x + 7,  y - 8, 12, 20);
      ctx.fillRect(x + 24, y - 8, 12, 20);
      ctx.fillRect(x + 4,  y + 10, 17, 6);
      ctx.fillRect(x + 22, y + 10, 17, 6);
      // X eyes
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 11px monospace';
      ctx.fillText('×', x + 34, y - 53);
      ctx.fillText('×', x + 44, y - 53);
    }
  }
};

// ─── Obstacles ────────────────────────────────────────────────────────────────
let obstacles    = [];
let nextSpawnIn  = 100;

const CACTUS_CONFIGS = {
  sm: { trunkW: 13, trunkH: 38, arms: false },
  md: { trunkW: 16, trunkH: 54, arms: true, armY: 20, armH: 12, armW: 14 },
  lg: { trunkW: 20, trunkH: 68, arms: true, armY: 26, armH: 15, armW: 17 },
};

function spawnObstacle() {
  const types = ['cactus', 'cactus', 'cactus', 'rock'];
  const sizes = ['sm', 'sm', 'md', 'md', 'lg'];
  obstacles.push({
    x: W + 20,
    type: types[Math.floor(Math.random() * types.length)],
    size: sizes[Math.floor(Math.random() * sizes.length)]
  });
}

function cactusBox(obs) {
  const c = CACTUS_CONFIGS[obs.size];
  const half = c.trunkW / 2;
  return { x: obs.x - half + 2, y: GROUND - c.trunkH - 6, w: c.trunkW - 4, h: c.trunkH + 6 };
}

function rockBox(obs) {
  const r = { sm: 17, md: 25, lg: 32 }[obs.size];
  return { x: obs.x - r + 5, y: GROUND - r * 1.1, w: (r - 5) * 2, h: r * 1.1 };
}

function drawCactus(obs) {
  const { x } = obs;
  const c = CACTUS_CONFIGS[obs.size];
  const half = c.trunkW / 2;
  const col  = '#5ac87a';
  const dark = '#3a9a58';

  ctx.fillStyle = col;
  // trunk
  ctx.fillRect(x - half, GROUND - c.trunkH, c.trunkW, c.trunkH);
  // tip
  ctx.fillRect(x - half + 2, GROUND - c.trunkH - 7, c.trunkW - 4, 9);

  if (c.arms) {
    const { armY, armH, armW } = c;
    // left arm
    ctx.fillRect(x - half - armW, GROUND - c.trunkH + armY, armW + 2, armH);
    ctx.fillRect(x - half - armW, GROUND - c.trunkH + armY - armH, armH - 2, armH + 2);
    // right arm
    ctx.fillRect(x + half - 2, GROUND - c.trunkH + armY, armW + 2, armH);
    ctx.fillRect(x + half + armW - armH + 2, GROUND - c.trunkH + armY - armH, armH - 2, armH + 2);
  }

  // shade
  ctx.fillStyle = dark;
  ctx.fillRect(x - half, GROUND - c.trunkH, 4, c.trunkH);
}

function drawRock(obs) {
  const { x } = obs;
  const r = { sm: 17, md: 25, lg: 32 }[obs.size];

  ctx.fillStyle = '#4a3a7a';
  ctx.beginPath();
  ctx.ellipse(x, GROUND - r * 0.55, r, r * 0.62, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#6a5aaa';
  ctx.beginPath();
  ctx.ellipse(x - r * 0.25, GROUND - r * 0.8, r * 0.35, r * 0.28, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#7a6abb';
  ctx.beginPath();
  ctx.ellipse(x + r * 0.1, GROUND - r * 0.9, r * 0.2, r * 0.15, 0.3, 0, Math.PI * 2);
  ctx.fill();
}

// ─── Particles ────────────────────────────────────────────────────────────────
let particles = [];

function burst() {
  const colors = ['#a855f7','#f0abfc','#7c3aed','#e879f9','#fbbf24'];
  for (let i = 0; i < 22; i++) {
    particles.push({
      x: DINO_X + 22, y: dino.y - 30,
      vx: (Math.random() - 0.5) * 9,
      vy: (Math.random() - 1.2) * 8,
      life: 1,
      col: colors[Math.floor(Math.random() * colors.length)],
      size: 3 + Math.random() * 4
    });
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function overlaps(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x
      && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ─── Draw background ──────────────────────────────────────────────────────────
function drawBG() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, '#08081f');
  grad.addColorStop(1, '#160a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND);

  // stars
  STARS.forEach(s => {
    const a = 0.25 + 0.75 * Math.abs(Math.sin(tick * 0.018 + s.phase));
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // clouds
  CLOUDS.forEach(c => {
    ctx.fillStyle = 'rgba(168,85,247,0.055)';
    ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, 13, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*.22, c.y+5, c.w*.28, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*.22, c.y+5, c.w*.28, 9, 0, 0, Math.PI*2); ctx.fill();
  });

  // ground
  ctx.fillStyle = '#1e0f38';
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // ground line glow
  ctx.strokeStyle = '#a855f766';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();

  // dashes on ground
  ctx.fillStyle = '#a855f720';
  for (let i = 0; i < 22; i++) {
    const xOff = (tick * speed * 0.35) % 40;
    ctx.fillRect(i * 40 - xOff, GROUND + 12, 22, 3);
    ctx.fillRect(i * 40 - xOff + 8, GROUND + 24, 12, 2);
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.font      = '11px "Press Start 2P"';
  ctx.textAlign = 'right';

  const sc = String(Math.floor(score)).padStart(5, '0');
  const hs = String(highScore).padStart(5, '0');

  ctx.fillStyle = '#ffffff33';
  ctx.fillText(`HI ${hs}`, W - 16, 26);

  ctx.fillStyle = score > 0 && Math.floor(score) > highScore - 1
    ? '#ffd700'
    : '#ffffffbb';
  ctx.fillText(sc, W - 16, 46);

  // speed pip
  const bars = Math.min(Math.floor((speed - 6) / 0.5), 10);
  ctx.fillStyle = '#a855f755';
  for (let i = 0; i < 10; i++) {
    ctx.fillRect(16 + i * 10, 16, 7, 14);
  }
  ctx.fillStyle = '#a855f7';
  for (let i = 0; i < bars; i++) {
    ctx.fillRect(16 + i * 10, 16, 7, 14);
  }
  ctx.font      = '6px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a855f766';
  ctx.fillText('SPEED', 16, 42);
}

// ─── Screens ──────────────────────────────────────────────────────────────────
function drawIntro() {
  ctx.fillStyle = 'rgba(8,8,31,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#a855f7';
  ctx.font = '18px "Press Start 2P"';
  ctx.fillText('🦕  DINO GAME', W/2, H/2 - 36);

  ctx.fillStyle = '#ffffff99';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('PRESSIONE  ESPAÇO / ↑ / TAP', W/2, H/2 + 8);

  // blinking text
  if (Math.floor(tick / 30) % 2 === 0) {
    ctx.fillStyle = '#a855f7aa';
    ctx.font = '6px "Press Start 2P"';
    ctx.fillText('by  NathaliaMend', W/2, H/2 + 38);
  }
}

function drawDead() {
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4444';
  ctx.font = '15px "Press Start 2P"';
  ctx.fillText('GAME  OVER', W/2, H/2 - 26);

  ctx.fillStyle = '#ffffff88';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('ESPAÇO / TAP  para recomeçar', W/2, H/2 + 8);

  if (Math.floor(score) >= highScore && highScore > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText('🏆  NOVO RECORDE!', W/2, H/2 + 30);
  }
}

// ─── Game loop ────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  tick++;
  score += 0.12;
  speed  = 6 + Math.floor(score / 80) * 0.5;

  dino.update();

  // obstacles
  if (--nextSpawnIn <= 0) {
    spawnObstacle();
    nextSpawnIn = Math.max(38, Math.floor(80 + Math.random() * 55 - speed * 2.2));
  }
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -60);

  // collision
  const db = dino.box();
  for (const obs of obstacles) {
    const ob = obs.type === 'cactus' ? cactusBox(obs) : rockBox(obs);
    if (overlaps(db, ob)) {
      state = 'dead';
      if (Math.floor(score) > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem('nm_hs', highScore);
      }
      burst();
      break;
    }
  }

  // clouds
  CLOUDS.forEach(c => { c.x -= c.spd; if (c.x < -c.w) c.x = W + c.w; });

  // particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.life -= 0.025;
  });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  drawBG();

  obstacles.forEach(o => o.type === 'cactus' ? drawCactus(o) : drawRock(o));

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.col;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.globalAlpha = 1;
  });

  dino.draw(state === 'dead');
  drawHUD();

  if (state === 'intro') drawIntro();
  if (state === 'dead')  drawDead();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ─── Controls ────────────────────────────────────────────────────────────────
function action() {
  if (state === 'playing') {
    dino.jump();
  } else {
    state = 'playing';
    score = 0; speed = 6; tick = 0;
    obstacles = []; nextSpawnIn = 100; particles = [];
    dino.reset();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); action(); }
});
canvas.addEventListener('click',      () => action());
canvas.addEventListener('touchstart', e => { e.preventDefault(); action(); }, { passive: false });

loop();
</script>
</body>
</html>
